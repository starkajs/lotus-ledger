# fly.toml — Lotus Ledger on Fly.io (org: aptim-solutions)
# https://fly.io/docs/reference/configuration/

app = "lotus-ledger"
primary_region = "lhr"

[build]

# After Postgres is attached and DATABASE_URL is set, uncomment:
# [deploy]
#   release_command = "node scripts/db-migrate.mjs"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
